<!DOCTYPE html>
<html lang="sw">
  <head>
    <meta charset="UTF-8">
    
    <link rel="icon" type="image/png" href="/logo/image.png">
    <meta name="color-scheme" content="dark">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="KEDESH SAAS - Mfumo Salama wa Kimataifa wa Kutuma Bulk SMS na Live Chat.">
    
    <title>KEDESH SAAS | Premium WhatsApp API</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- ======================================================== -->
    <!-- 🔥 INJINI YA FACEBOOK SDK (KWA EMBEDDED SIGNUP) 🔥 -->
    <!-- ======================================================== -->
    <script>
      window.fbAsyncInit = function() {
        FB.init({
          appId      : '860384560467802', // Hii ni App ID yako ya KEDESH LIMITED
          cookie     : true,              // Inaruhusu Meta kusoma cookies kutambua session ya mteja
          xfbml      : true,              // Inaruhusu Meta kuchora vitufe kama vipo
          version    : 'v20.0'            // Tunatumia Toleo thabiti la SDK
        });
        console.log("🟢 [FACEBOOK SDK] Mtambo wa Meta upo tayari kwa usajili!");
      };
    </script>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>
    <!-- ======================================================== -->

    <style>
      body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        background-color: #020617; /* Giza la Kifahari la KEDESH */
        font-family: 'Plus Jakarta Sans', sans-serif; 
        overflow: hidden; /* Tunazuia scroll wakati inaload */
      }
      
      .kedesh-splash { 
        display: flex; flex-direction: column; align-items: center; justify-content: center; 
        height: 100vh; width: 100vw; position: relative; overflow: hidden; 
        color: white; text-align: center; 
        background: linear-gradient(135deg, #020617 0%, #1e1b4b 100%);
      }
      
      /* Mionzi inayozunguka (Glow Effect) */
      .splash-glow { 
        position: absolute; width: 350px; height: 350px; 
        background: rgba(79, 70, 229, 0.15); border-radius: 50%; filter: blur(70px); 
        animation: pulseGlow 3s infinite alternate; 
      }
      @keyframes pulseGlow { 
        0% { transform: scale(0.8); opacity: 0.5; } 
        100% { transform: scale(1.2); opacity: 1; } 
      }

      /* Logo Inayopiga Mapigo (Heartbeat) */
      .splash-logo { 
        width: 100px; height: auto; object-fit: contain; position: relative; z-index: 10; 
        margin-bottom: 25px; animation: heartbeat 2s infinite ease-in-out; 
        filter: drop-shadow(0 0 20px rgba(79, 70, 229, 0.4));
      }
      @keyframes heartbeat { 
        0%, 100% { transform: scale(1); } 
        50% { transform: scale(1.05); } 
      }

      .splash-title { 
        font-size: 2rem; font-weight: 800; letter-spacing: 2px; margin: 0 0 10px 0; 
        z-index: 10; position: relative; 
        background: linear-gradient(to right, #ffffff, #a5b4fc);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      .splash-text { 
        color: #94a3b8; font-size: 1rem; font-weight: 500; z-index: 10; position: relative; 
        margin-bottom: 40px; 
      }

      /* Loader ya Kibenki */
      .premium-loader { 
        width: 45px; height: 45px; border: 4px solid rgba(255, 255, 255, 0.1); 
        border-top: 4px solid #10b981; border-radius: 50%; z-index: 10; position: relative; 
        animation: spin 1s linear infinite; 
      }
      @keyframes spin { 
        0% { transform: rotate(0deg); } 
        100% { transform: rotate(360deg); } 
      }

      /* Beji ya Usalama */
      .splash-security { 
        position: absolute; bottom: 50px; display: flex; align-items: center; gap: 8px; 
        color: #10b981; font-size: 0.9rem; font-weight: 700; 
        background: rgba(16, 185, 129, 0.05); padding: 10px 20px; border-radius: 30px; 
        border: 1px solid rgba(16, 185, 129, 0.2); z-index: 10; -webkit-backdrop-filter: blur(5px); backdrop-filter: blur(5px);
      }
    </style>
  </head>
  
  <body>
    <noscript>
      <div style="background: #b91c1c; color: white; padding: 15px; text-align: center; font-family: sans-serif; font-weight: bold; position: fixed; top: 0; width: 100%; z-index: 100000;">
        ⚠️ KOSA LA KIUSALAMA: Mfumo unahitaji JavaScript kufanya kazi kikamilifu. Tafadhali iwashe.
      </div>
    </noscript>

    <div id="app">
      <div class="kedesh-splash">
        <div class="splash-glow"></div>
        <img src="/logo/image.png" alt="Kedesh Limited" class="splash-logo" />
        <h1 class="splash-title">KEDESH SAAS</h1>
        <p class="splash-text">Inaanzisha Mfumo wa Usalama...</p>
        <div class="premium-loader"></div>
        
        <div class="splash-security">
          <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          256-Bit End-to-End Encrypted
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
